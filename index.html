<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flux - Berserk Edition</title>
    <style>
        /* PURE BLACK SNAPCHAT STYLE THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; height: -webkit-fill-available; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000000; color: #ffffff; height: 100dvh; overflow: hidden; user-select: none; }

        /* --- SCREEN TRANSITIONS --- */
        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background: #000; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; display: flex; flex-direction: column; }
        
        .hidden-right { transform: translateX(100%); pointer-events: none; opacity: 0; }
        .hidden-down { transform: translateY(150vh); pointer-events: none; opacity: 0; } 
        .hidden-fade { opacity: 0; pointer-events: none; transform: scale(0.95); }

        #mainScreen { z-index: 10; }
        #activeChatScreen { z-index: 20; }
        #settingsScreen { z-index: 30; }
        #loginScreen { z-index: 40; justify-content: center; align-items: center; }

        /* --- LOGIN SCREEN --- */
        .login-box { width: 85%; max-width: 350px; text-align: center; }
        .brand-logo svg { width: 60px; fill: #ff003c; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,0,60,0.5)); }
        .input-dark { width: 100%; padding: 16px; background: #111; border: 1px solid #222; color: #fff; border-radius: 12px; margin-bottom: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #ff003c; }
        .input-dark:disabled { color: #00ffcc; border: 1px dashed #333; opacity: 0.8; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }

        /* --- MAIN CHAT LIST SCREEN --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top, 20px) 20px 10px 20px; border-bottom: 1px solid #111; }
        .nav-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .action-btns { display: flex; gap: 15px; }
        .icon-btn { background: #111; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        .list-container { flex-grow: 1; overflow-y: auto; padding: 10px 20px; }
        .list-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #222; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-right: 15px; position: relative; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; border: 2px solid #000; display: none; } 
        .online-dot.active { display: block; } 
        .item-info { flex-grow: 1; }
        .item-name { font-size: 17px; font-weight: 600; }
        .item-sub { font-size: 13px; color: #666; margin-top: 4px; }

        /* --- ACTIVE CHAT SCREEN --- */
        .chat-header { display: flex; align-items: center; padding: env(safe-area-inset-top, 20px) 20px 20px 20px; border-bottom: 1px solid #111; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: #fff; }
        .chat-title-info { display: flex; flex-direction: column; }
        .chat-room-name { font-size: 18px; font-weight: 700; }
        
        .messages-feed { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message-wrapper { display: flex; flex-direction: column; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(10px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg-sender { font-size: 12px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .badge { padding: 2px 5px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }
        .msg-bubble { background: #1a1a1a; padding: 12px 16px; border-radius: 4px 18px 18px 18px; font-size: 16px; line-height: 1.4; max-width: 85%; word-wrap: break-word; }
        .msg-self .msg-bubble { background: #fff; color: #000; border-radius: 18px 4px 18px 18px; align-self: flex-end; }
        .msg-self .msg-sender { justify-content: flex-end; }

        .typing-indicator { display: none; padding: 10px 20px; align-items: center; gap: 4px; color: #666; font-size: 13px; font-weight: 600; }
        .dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .chat-input-zone { padding: 10px 20px calc(20px + env(safe-area-inset-bottom)) 20px; background: #000; border-top: 1px solid #111; }
        .chat-input-box { display: flex; background: #1a1a1a; border-radius: 24px; padding: 5px 5px 5px 20px; align-items: center; }
        .chat-input-box input { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
        .send-btn { background: #fff; color: #000; border: none; border-radius: 50%; min-width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; }

        /* --- SETTINGS SCREEN --- */
        #settingsScreen { background: #0a0a0c; padding: env(safe-area-inset-top, 30px) 30px 30px 30px; }
        .settings-close { text-align: right; font-size: 40px; cursor: pointer; color: #666; margin-bottom: 20px; line-height: 1; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen">
        <div class="login-box">
            <div class="brand-logo">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 0 L45 20 L35 15 L45 35 L30 30 L45 50 L20 40 L40 65 L10 60 L45 80 L35 110 L50 90 L65 110 L55 80 L90 60 L60 65 L80 40 L55 50 L70 30 L55 35 L65 15 L55 20 Z" />
                    <line x1="50" y1="0" x2="50" y2="120" stroke="#ff003c" stroke-width="4"/>
                </svg>
            </div>
            <input type="text" id="displayName" class="input-dark" placeholder="Username" autocomplete="off">
            <input type="password" id="roomCode" class="input-dark" placeholder="Secret Code">
            <button class="btn-main" id="loginBtn">ENTER SQUAD</button>
        </div>
    </div>

    <div id="mainScreen" class="screen hidden-fade">
        <div class="top-nav">
            <div class="nav-title">
                Chats
