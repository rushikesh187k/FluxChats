<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Chat - Premium Server</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0c; color: #fff; height: 100vh; overflow: hidden; user-select: none; }

        /* --- LOGIN --- */
        #loginScreen { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: absolute; z-index: 100; background: #0a0a0c; transition: 0.5s; }
        .login-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #00ffcc, #0088ff); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; outline: none; }

        /* --- SETTINGS SIDEBAR --- */
        #settingsPanel { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #111116; border-left: 1px solid #222; z-index: 200; transition: 0.3s; padding: 30px; }
        .settings-open { right: 0 !important; }

        /* --- LAYOUT --- */
        #chatScreen { display: none; height: 100vh; width: 100vw; opacity: 0; transition: 0.5s; }
        .sidebar { width: 260px; background: #111116; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #16161b; }
        .messages-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* --- BADGES --- */
        .badge { font-size: 9px; padding: 3px 6px; border-radius: 4px; font-weight: 900; margin-right: 5px; text-transform: uppercase; }
        .badge-admin { color: #00ffcc; border: 1px solid #00ffcc; background: rgba(0,255,204,0.1); }
        .badge-dev { color: #0088ff; border: 1px solid #0088ff; background: rgba(0,136,255,0.1); }
        .badge-emp { color: #ff0044; border: 1px solid #ff0044; background: rgba(255,0,68,0.1); }

        .message { display: flex; flex-direction: column; margin-bottom: 5px; transition: 0.2s; }
        .admin-mode .message:hover { background: rgba(255, 255, 255, 0.03); cursor: pointer; border-radius: 5px; }

        .sender { font-weight: 700; font-size: 14px; display: flex; align-items: center; }
        .text { color: #dcddde; font-size: 15px; margin-top: 4px; word-wrap: break-word; }

        .input-zone { padding: 20px; background: #16161b; }
        .input-box { display: flex; background: #2b2d31; border-radius: 10px; padding: 10px; align-items: center; }
        .input-box input { border: none; background: transparent; color: #fff; width: 100%; outline: none; margin: 0; }
        
        .global-btn { background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; border-radius: 8px; font-weight: 800; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .member { display: flex; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #ccc; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #43b581; margin-right: 12px; }
        .watermark-overlay { position: fixed; top: 0; opacity: 0.02; pointer-events: none; z-index: 9999; transform: rotate(-30deg) scale(2); width: 100%; height: 100%; font-weight: 900; }
        
        .icon-btn { cursor: pointer; font-size: 20px; margin-left: 15px; color: #888; transition: 0.2s; }
        .icon-btn:hover { color: #00ffcc; }
    </style>
</head>
<body id="mainBody">

    <div id="settingsPanel">
        <h3 style="color:#00ffcc; margin-bottom:20px;">USER SETTINGS</h3>
        
        <label style="font-size:12px; color:#888;">NAME COLOR</label>
        <input type="color" id="userColorPicker" value="#ffffff" style="height:50px; cursor:pointer;">

        <div style="margin-top:30px;">
            <label style="font-size:12px; color:#888;">CHANGE USERNAME</label>
            <input type="text" id="newNameInput" placeholder="New Name...">
            <p id="timerLabel" style="font-size:10px; color:#ff0044; margin-top:5px;"></p>
            <button class="login-btn" onclick="requestNameChange()" style="font-size:12px; padding:10px;">UPDATE NAME</button>
        </div>

        <button onclick="toggleSettings()" style="margin-top:50px; background:transparent; border:1px solid #444; color:#888; width:100%; padding:10px; border-radius:8px; cursor:pointer;">CLOSE</button>
    </div>

    <div id="loginScreen">
        <div class="login-container">
            <h2 style="color:#00ffcc">FLUX SQUAD</h2>
            <input type="text" id="displayName" placeholder="Username" autocomplete="off">
            <input type="password" id="roomCode" placeholder="Secret Code">
            <button class="login-btn" id="loginBtn">ACCESS SERVER</button>
        </div>
    </div>

    <div id="chatScreen">
        <div class="watermark-overlay" id="watermark"></div>
        <div class="sidebar">
            <div style="padding:20px; font-weight:800; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                FLUX NETWORK
                <span class="icon-btn" onclick="toggleSettings()">⚙️</span>
            </div>
            <div style="padding:15px; flex-grow:1;">
                <div class="global-btn" onclick="switchRoom('global')">🌍 GLOBAL CHAT</div>
                <div id="activeMembers"></div>
            </div>
        </div>
        <div class="chat-area">
            <div id="roomHeader" style="padding:20px; border-bottom:1px solid #222; font-weight:600;"># vip-lounge</div>
            <div class="messages-container" id="chatFeed"></div>
            <div class="input-zone">
                <div class="input-box">
                    <input type="text" id="messageInput" placeholder="Message global..." autocomplete="off">
                    <button id="sendBtn" style="background:none; border:none; color:#00ffcc; cursor:pointer">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPnStupHytou8te3O-Xxb6TvEK8VnLzg8",
            authDomain: "fluxchat-9b101.firebaseapp.com",
            projectId: "fluxchat-9b101",
            storageBucket: "fluxchat-9b101.firebasestorage.app",
            messagingSenderId: "1009980465023",
            appId: "1:1009980465023:web:bbdfa372d709c9c2ccc44a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentRoom = 'global';
        let allMessagesData = [];
        let userCounts = {};

        // --- PREFERENCES & LOCKS ---
        const savedName = localStorage.getItem('flux_name');
        const lastChange = localStorage.getItem('flux_name_date'); // Stores timestamp
        const savedColor = localStorage.getItem('flux_color') || '#ffffff';
        
        document.getElementById('userColorPicker').value = savedColor;
        if (savedName) document.getElementById('displayName').value = savedName;

        // Toggle Settings Sidebar
        window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('settings-open');

        // Handle Name Change Request
        window.requestNameChange = () => {
            const newName = document.getElementById('newNameInput').value.trim();
            const now = Date.now();
            const thirtyDays = 30 * 24 * 60 * 60 * 1000;

            if (!newName) return alert("Enter a name!");

            if (lastChange && (now - lastChange < thirtyDays)) {
                const daysLeft = Math.ceil((thirtyDays - (now - lastChange)) / (1000 * 60 * 60 * 24));
                document.getElementById('timerLabel').innerText = `Wait ${daysLeft} more days to change name.`;
            } else {
                localStorage.setItem('flux_name', newName);
                localStorage.setItem('flux_name_date', now);
                alert("Name updated! Refresh to apply.");
                location.reload();
            }
        };

        // Color Change
        document.getElementById('userColorPicker').addEventListener('input', (e) => {
            localStorage.setItem('flux_color', e.target.value);
        });

        // Login
        document.getElementById('loginBtn').addEventListener('click', () => {
            const name = document.getElementById('displayName').value.trim();
            const code = document.getElementById('roomCode').value.trim();
            if(name !== '' && code.toUpperCase() === 'FLUX2026') {
                if(!localStorage.getItem('flux_name')) {
                    localStorage.setItem('flux_name', name);
                    localStorage.setItem('flux_name_date', Date.now());
                }
                sessionStorage.setItem('username', name);
                if(name.toLowerCase() === 'rushikesh') document.getElementById('mainBody').classList.add('admin-mode');
                document.getElementById('watermark').innerText = (name + " ").repeat(200);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                setTimeout(() => document.getElementById('chatScreen').style.opacity = '1', 50);
            }
        });

        // --- ADMIN DELETE ---
        window.deleteMessage = async (id) => {
            if (sessionStorage.getItem('username').toLowerCase() === 'rushikesh') {
                if (confirm("Delete forever?")) await deleteDoc(doc(db, "messages", id));
            }
        };

        // --- CHAT LOGIC ---
        window.switchRoom = (target) => {
            const me = sessionStorage.getItem('username');
            if (target === me) return;
            currentRoom = (target === 'global') ? 'global' : `private_${[me, target].sort().join('_')}`;
            document.getElementById('roomHeader').innerText = target === 'global' ? "# vip-lounge" : "🔒 Chat with " + target;
            renderChat();
        };

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const user = sessionStorage.getItem('username');
            const color = localStorage.getItem('flux_color') || '#ffffff';
            let isAnnounce = (text.startsWith('ANNOUNCE:') && user.toLowerCase() === 'rushikesh');
            let cleanText = isAnnounce ? text.replace('ANNOUNCE:', '').trim() : text;
            input.value = '';
            await addDoc(collection(db, "messages"), { text: cleanText, sender: user, color: color, announce: isAnnounce, room: currentRoom, timestamp: serverTimestamp() });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), snapshot => {
            allMessagesData = []; userCounts = {};
            snapshot.forEach(d => {
                let data = d.data(); data.id = d.id;
                allMessagesData.push(data);
                if (data.room === 'global' || !data.room) userCounts[data.sender] = (userCounts[data.sender] || 0) + 1;
            });
            updateSidebar(); renderChat();
        });

        function updateSidebar() {
            const div = document.getElementById('activeMembers'); div.innerHTML = '';
            const me = sessionStorage.getItem('username');
            Object.keys(userCounts).forEach(u => {
                if (u !== me) div.innerHTML += `<div class="member" onclick="switchRoom('${u}')"><div class="status-dot"></div>${u}</div>`;
            });
        }

        function renderChat() {
            const feed = document.getElementById('chatFeed'); feed.innerHTML = '';
            allMessagesData.forEach(d => {
                if ((d.room || 'global') === currentRoom) {
                    if (d.announce) {
                        feed.innerHTML += `<div class="announcement" ondblclick="deleteMessage('${d.id}')">📢 ${d.text}</div>`;
                    } else {
                        let b = 'badge-newbie', t = 'SQUAD', n = d.sender.toLowerCase();
                        if (n === 'rushikesh') { b = 'badge-admin'; t = '👑 ADMIN'; }
                        else if (n === 'shreyash') { b = 'badge-dev'; t = '💻 DEV'; }
                        else if (n === 'roshan') { b = 'badge-emp'; t = '🌋 EMP'; }
                        else if (userCounts[d.sender] >= 50) { b = 'badge-elite'; t = '⭐ ELITE'; }

                        feed.innerHTML += `
                            <div class="message" ondblclick="deleteMessage('${d.id}')">
                                <div class="sender" style="color:${d.color || '#fff'}"><span class="badge ${b}">${t}</span>${d.sender}</div>
                                <div class="text">${d.text}</div>
                            </div>`;
                    }
                }
            });
            feed.scrollTop = feed.scrollHeight;
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('blur', () => document.body.style.filter = 'blur(15px)');
        window.addEventListener('focus', () => document.body.style.filter = 'none');
    </script>
</body>
</html>
