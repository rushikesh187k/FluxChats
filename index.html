<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="Flux">
    <meta name="application-name" content="Flux">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Berserk_brand_of_sacrifice.svg/512px-Berserk_brand_of_sacrifice.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Berserk_brand_of_sacrifice.svg/512px-Berserk_brand_of_sacrifice.svg.png">

    <title>Flux - Berserk Edition</title>
    <style>                
        /* PURE BLACK SNAPCHAT STYLE THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; height: -webkit-fill-available; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000000; color: #ffffff; height: 100dvh; overflow: hidden; user-select: none; }

        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background: #000; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; display: flex; flex-direction: column; }
        .hidden-right { transform: translateX(100%); pointer-events: none; opacity: 0; }
        .hidden-down { transform: translateY(150vh); pointer-events: none; opacity: 0; } 
        .hidden-fade { opacity: 0; pointer-events: none; transform: scale(0.95); }

        #mainScreen { z-index: 10; }
        #activeChatScreen { z-index: 20; }
        #settingsScreen { z-index: 30; }
        #loginScreen { z-index: 40; justify-content: center; align-items: center; }

        .login-box { width: 85%; max-width: 350px; text-align: center; }
        .brand-logo svg { width: 60px; fill: #ff003c; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,0,60,0.5)); }
        .input-dark { width: 100%; padding: 16px; background: #111; border: 1px solid #222; color: #fff; border-radius: 12px; margin-bottom: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #ff003c; }
        .input-dark:disabled { color: #00ffcc; border: 1px dashed #333; opacity: 0.8; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top, 20px) 20px 10px 20px; border-bottom: 1px solid #111; }
        .nav-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .action-btns { display: flex; gap: 15px; }
        .icon-btn { background: #111; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        .list-container { flex-grow: 1; overflow-y: auto; padding: 10px 20px; }
        .list-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #222; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-right: 15px; position: relative; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; border: 2px solid #000; display: none; } 
        .online-dot.active { display: block; } 
        .item-info { flex-grow: 1; }
        .item-name { font-size: 17px; font-weight: 600; }
        .item-sub { font-size: 13px; color: #666; margin-top: 4px; }

        .chat-header { display: flex; align-items: center; padding: env(safe-area-inset-top, 20px) 20px 20px 20px; border-bottom: 1px solid #111; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: #fff; }
        .chat-title-info { display: flex; flex-direction: column; }
        .chat-room-name { font-size: 18px; font-weight: 700; }
        
        .messages-feed { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message-wrapper { display: flex; flex-direction: column; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(10px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg-sender { font-size: 12px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .badge { padding: 2px 5px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }
        .msg-bubble { background: #1a1a1a; padding: 12px 16px; border-radius: 4px 18px 18px 18px; font-size: 16px; line-height: 1.4; max-width: 85%; word-wrap: break-word; }
        .msg-self .msg-bubble { background: #fff; color: #000; border-radius: 18px 4px 18px 18px; align-self: flex-end; }
        .msg-self .msg-sender { justify-content: flex-end; }

        .typing-indicator { display: none; padding: 10px 20px; align-items: center; gap: 4px; color: #666; font-size: 13px; font-weight: 600; }
        .dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .chat-input-zone { padding: 10px 20px calc(20px + env(safe-area-inset-bottom)) 20px; background: #000; border-top: 1px solid #111; }
        .chat-input-box { display: flex; background: #1a1a1a; border-radius: 24px; padding: 5px 5px 5px 15px; align-items: center; }
        .chat-input-box input[type="text"] { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; margin-left: 10px; }
        .send-btn { background: #fff; color: #000; border: none; border-radius: 50%; min-width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; }
        .media-btn { background: transparent; border: none; color: #888; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 5px; transition: 0.2s; }
        .media-btn:active { transform: scale(0.9); color: #fff; }

        #settingsScreen { background: #0a0a0c; padding: env(safe-area-inset-top, 30px) 30px 30px 30px; }
        .settings-close { text-align: right; font-size: 40px; cursor: pointer; color: #666; margin-bottom: 20px; line-height: 1; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen">
        <div class="login-box">
            <div class="brand-logo">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 0 L45 20 L35 15 L45 35 L30 30 L45 50 L20 40 L40 65 L10 60 L45 80 L35 110 L50 90 L65 110 L55 80 L90 60 L60 65 L80 40 L55 50 L70 30 L55 35 L65 15 L55 20 Z" />
                    <line x1="50" y1="0" x2="50" y2="120" stroke="#ff003c" stroke-width="4"/>
                </svg>
            </div>
            <input type="text" id="displayName" class="input-dark" placeholder="Username" autocomplete="off">
            <input type="password" id="roomCode" class="input-dark" placeholder="Secret Code">
            <button class="btn-main" id="loginBtn">ENTER SQUAD</button>
        </div>
    </div>

    <div id="mainScreen" class="screen hidden-fade">
        <div class="top-nav">
            <div class="nav-title">
                Chats
                <svg width="24" height="24" viewBox="0 0 100 120" style="fill:#ff003c;"><path d="M50 0 L45 20 L35 15 L45 35 L30 30 L45 50 L20 40 L40 65 L10 60 L45 80 L35 110 L50 90 L65 110 L55 80 L90 60 L60 65 L80 40 L55 50 L70 30 L55 35 L65 15 L55 20 Z"/><line x1="50" y1="0" x2="50" y2="120" stroke="#ff003c" stroke-width="4"/></svg>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="createNewGroup()">➕</button>
                <button class="icon-btn" onclick="toggleScreen('settingsScreen', true)">⚙️</button>
            </div>
        </div>
        <div class="list-container" id="chatsList">
            <div class="list-item" onclick="openChat('global', '🌍 Global Lounge')">
                <div class="avatar" style="background:#fff; color:#000;">🌍</div>
                <div class="item-info">
                    <div class="item-name">Global Lounge</div>
                    <div class="item-sub">Tap to open squad chat</div>
                </div>
            </div>
            <div id="dynamicList"></div>
        </div>
    </div>

    <div id="activeChatScreen" class="screen hidden-right">
        <div class="chat-header">
            <div class="back-btn" onclick="toggleScreen('activeChatScreen', false)">‹</div>
            <div class="chat-title-info">
                <div class="chat-room-name" id="chatTitle">Room</div>
            </div>
        </div>
        <div class="messages-feed" id="chatFeed"></div>
        
        <div class="typing-indicator" id="typingBox">
            <span id="typingName">Someone</span> is typing
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="chat-input-zone">
            <div class="chat-input-box">
                <button class="media-btn" id="photoBtn">📷</button>
                <input type="file" id="mediaUpload" style="display: none;" accept="image/*">
                
                <input type="text" id="messageInput" placeholder="Send a chat..." autocomplete="off">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <div id="settingsScreen" class="screen hidden-down">
        <div class="settings-close" onclick="toggleScreen('settingsScreen', false)">×</div>
        <h2 style="font-weight:800; font-size:30px; margin-bottom:30px;">Settings</h2>
        
        <label style="color:#666; font-size:12px; font-weight:700;">NAME GLOW COLOR</label>
        <input type="color" id="userColorPicker" value="#ffffff" style="width:100%; height:60px; border:none; border-radius:12px; margin-bottom:30px; background:transparent; cursor:pointer;">

        <label style="color:#666; font-size:12px; font-weight:700;">UPDATE USERNAME</label>
        <input type="text" id="newNameInput" class="input-dark" placeholder="New Name...">
        <button class="btn-main" onclick="requestNameChange()" style="margin-top:10px;">SAVE PROFILE</button>
        
        <div style="margin-top:auto; padding-top:40px; text-align:center; color:#444; font-size:12px;">
            FLUX OS v8.1 • Bypassed Edition
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPnStupHytou8te3O-Xxb6TvEK8VnLzg8",
            authDomain: "fluxchat-9b101.firebaseapp.com",
            projectId: "fluxchat-9b101",
            storageBucket: "fluxchat-9b101.firebasestorage.app",
            messagingSenderId: "1009980465023",
            appId: "1:1009980465023:web:bbdfa372d709c9c2ccc44a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentRoom = 'global';
        let allMessagesData = [];
        let onlineUsers = {}; 
        let myName = localStorage.getItem('flux_name') || '';

        // --- ADMIN DELETE POWER ---
        window.deleteMessage = async (id) => {
            if (myName.toLowerCase() === 'rushikesh') {
                if (confirm("Delete this message forever?")) {
                    await deleteDoc(doc(db, "messages", id));
                }
            }
        };

        // --- PRESENCE SYSTEM ---
        function setOnlineStatus(status) {
            if (myName) {
                try { setDoc(doc(db, "users", myName), { isOnline: status }, { merge: true }); } 
                catch(e) {}
            }
        }

        document.addEventListener("visibilitychange", () => setOnlineStatus(document.visibilityState === 'visible'));
        window.addEventListener("pagehide", () => setOnlineStatus(false));
        window.addEventListener("beforeunload", () => setOnlineStatus(false));
        setInterval(() => { if (document.visibilityState === 'visible') setOnlineStatus(true); }, 15000);

        // --- UI NAVIGATION ---
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('focus', () => {
            setTimeout(() => { document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight; }, 300);
        });

        window.toggleScreen = (id, show) => {
            const screen = document.getElementById(id);
            if (id === 'activeChatScreen') {
                show ? screen.classList.remove('hidden-right') : screen.classList.add('hidden-right');
                if(show) setTimeout(() => document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight, 100);
            } else if (id === 'settingsScreen') {
                show ? screen.classList.remove('hidden-down') : screen.classList.add('hidden-down');
            }
        };

        // --- LOGIN ENGINE ---
        if (myName) {
            document.getElementById('displayName').value = myName;
            document.getElementById('displayName').disabled = true;
        }

        async function attemptLogin() {
            try {
                const name = document.getElementById('displayName').value.trim();
                const code = document.getElementById('roomCode').value.trim();
                
                if (!name) return alert("⚠️ Please enter your Username!");
                if (code.toUpperCase() !== 'FLUX2026') return alert("⛔ Wrong Secret Code!");

                document.getElementById('loginBtn').innerText = "CONNECTING...";

                if(!localStorage.getItem('flux_name')) localStorage.setItem('flux_name', name);
                myName = name;
                setOnlineStatus(true); 

                document.getElementById('loginScreen').classList.add('hidden-fade');
                document.getElementById('mainScreen').classList.remove('hidden-fade');
                document.getElementById('loginBtn').innerText = "ENTER SQUAD";
            } catch (error) {
                alert("CRASH DETECTED: " + error.message);
                document.getElementById('loginBtn').innerText = "ENTER SQUAD";
            }
        }

        document.getElementById('loginBtn').addEventListener('click', attemptLogin);
        document.getElementById('roomCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });


        // --- LIVE DATABASE SYNC ---
        onSnapshot(collection(db, "users"), snapshot => {
            onlineUsers = {};
            snapshot.forEach(doc => { onlineUsers[doc.id] = doc.data().isOnline; }); 
            updateListUI();
        });

        let activeGroups = [];
        onSnapshot(collection(db, "groups"), snapshot => {
            activeGroups = [];
            snapshot.forEach(doc => { activeGroups.push({ id: doc.id, name: doc.data().name }); });
            updateListUI();
        });

        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), snapshot => {
            allMessagesData = [];
            snapshot.forEach(d => { 
                let data = d.data();
                data.id = d.id; 
                allMessagesData.push(data); 
            });
            renderChat();
        });

        onSnapshot(collection(db, "typing"), snapshot => {
            const typingBox = document.getElementById('typingBox');
            let isSomeoneTyping = false;
            snapshot.forEach(doc => {
                const data = doc.data();
                if(doc.id === currentRoom && data.isTyping && data.user !== myName) {
                    document.getElementById('typingName').innerText = data.user;
                    isSomeoneTyping = true;
                }
            });
            typingBox.style.display = isSomeoneTyping ? 'flex' : 'none';
            if(isSomeoneTyping) document.getElementById('chatFeed').scrollTop = document.getElementById('chatFeed').scrollHeight;
        });


        // --- UI RENDERERS ---
        function updateListUI() {
            const listDiv = document.getElementById('dynamicList');
            let newHTML = '';
            
            activeGroups.forEach(g => {
                newHTML += `
                    <div class="list-item" onclick="openChat('${g.id}', '👥 ${g.name}')">
                        <div class="avatar" style="background:#222;">👥</div>
                        <div class="item-info"><div class="item-name">${g.name}</div></div>
                    </div>`;
            });

            Object.keys(onlineUsers).forEach(u => {
                if (u !== myName) {
                    const isOnline = onlineUsers[u] === true;
                    const statusClass = isOnline ? 'active' : '';
                    const statusText = isOnline ? 'Online right now' : 'Offline';
                    const roomId = `private_${[myName, u].sort().join('_')}`;
                    const initial = u.charAt(0).toUpperCase();
                    
                    newHTML += `
                        <div class="list-item" onclick="openChat('${roomId}', '🔒 ${u}')">
                            <div class="avatar">${initial}<div class="online-dot ${statusClass}"></div></div>
                            <div class="item-info">
                                <div class="item-name">${u}</div>
                                <div class="item-sub">${statusText}</div>
                            </div>
                        </div>`;
                }
            });

            listDiv.innerHTML = newHTML;
        }

        function renderChat() {
            const feed = document.getElementById('chatFeed'); feed.innerHTML = '';
            allMessagesData.forEach(d => {
                if ((d.room || 'global') === currentRoom) {
                    const isMe = d.sender === myName;
                    const wrapperClass = isMe ? 'message-wrapper msg-self' : 'message-wrapper';
                    
                    let b = '', t = '', c = d.color || '#fff';
                    let n = d.sender.toLowerCase();
                    if (n === 'rushikesh') { b = 'border:1px solid #00ffcc; color:#00ffcc;'; t = '👑 ADMIN'; c = '#00ffcc'; }
                    else if (n === 'shreyash') { b = 'border:1px solid #0088ff; color:#0088ff;'; t = '💻 DEV'; }
                    else if (n === 'roshan') { b = 'border:1px solid #ff0044; color:#ff0044;'; t = '🌋 EMP'; }

                    const badgeHtml = t ? `<span class="badge" style="${b}">${t}</span>` : '';

                    // MEDIA RENDERING
                    let mediaHtml = '';
                    if (d.type === 'image') {
                        mediaHtml = `<img src="${d.url}" style="width:100%; border-radius:12px; margin-top:5px; border:1px solid #333;">`;
                    }

                    let contentHtml = d.text 
                        ? `<div class="msg-bubble">${d.text}${mediaHtml}</div>` 
                        : `<div class="msg-bubble" style="padding:4px; background:transparent;">${mediaHtml}</div>`;

                    feed.innerHTML += `
                        <div class="${wrapperClass}" ondblclick="deleteMessage('${d.id}')">
                            <div class="msg-sender" style="color:${c}">${badgeHtml} ${d.sender}</div>
                            ${contentHtml}
                        </div>`;
                }
            });
            feed.scrollTop = feed.scrollHeight;
        }

        // --- MESSAGE & GROUP SENDING ---
        window.openChat = (roomId, displayTitle) => {
            currentRoom = roomId;
            document.getElementById('chatTitle').innerText = displayTitle;
            toggleScreen('activeChatScreen', true);
            renderChat();
        };

        window.createNewGroup = async () => {
            const groupName = prompt("Enter new Group Name:");
            if(groupName && groupName.trim() !== '') {
                const groupId = 'group_' + Date.now();
                await setDoc(doc(db, "groups", groupId), { name: groupName.trim(), creator: myName });
                openChat(groupId, '👥 ' + groupName);
            }
        };

        let typingTimeout;
        msgInput.addEventListener('input', () => {
            setDoc(doc(db, "typing", currentRoom), { user: myName, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setDoc(doc(db, "typing", currentRoom), { user: myName, isTyping: false });
            }, 1500);
        });

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            const color = localStorage.getItem('flux_color') || '#ffffff';
            msgInput.value = '';
            setDoc(doc(db, "typing", currentRoom), { user: myName, isTyping: false });
            await addDoc(collection(db, "messages"), { text: text, sender: myName, color: color, room: currentRoom, timestamp: serverTimestamp() });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });


        // --- NEW: THE IMGBB BYPASS ENGINE ---
        const photoBtn = document.getElementById('photoBtn');
        const mediaInput = document.getElementById('mediaUpload');

        photoBtn.addEventListener('click', () => mediaInput.click());

        mediaInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            photoBtn.innerText = '⏳'; // Show loading
            
            try {
                // 1. Prepare image for bypass
                const formData = new FormData();
                formData.append('image', file);

                // 2. IMPORTANT: Paste your real ImgBB API Key below!
                const apiKey = '490add9cb8d5f0adc742061acc80914c'; 

                // 3. Blast it to ImgBB
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.success) {
                    const url = data.data.url;
                    const color = localStorage.getItem('flux_color') || '#ffffff';

                    // 4. Send URL to Firebase
                    await addDoc(collection(db, "messages"), {
                        text: "",
                        sender: myName,
                        color: color,
                        room: currentRoom,
                        type: 'image',
                        url: url,
                        timestamp: serverTimestamp()
                    });
                } else {
                    alert("Bypass failed: Could not upload image.");
                }
            } catch (error) {
                alert("Upload error: " + error.message);
            }
            
            photoBtn.innerText = '📷'; // Reset button
            mediaInput.value = '';
        });

        // --- SETTINGS ---
        document.getElementById('userColorPicker').value = localStorage.getItem('flux_color') || '#ffffff';
        document.getElementById('userColorPicker').addEventListener('input', e => localStorage.setItem('flux_color', e.target.value));
        
        window.requestNameChange = () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (newName) {
                localStorage.setItem('flux_name', newName);
                alert("Name updated. Refreshing app.");
                location.reload();
            }
        };
    </script>
</body>
</html>
